[book]
title = "Subnetra Documentation"
authors = ["jettwang"]
description = "Pure-Zig, zero-dependency Layer-3 UDP tunnel that ships as a single static binary under 512KB — comprehensive documentation."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/jamiesun/subnetra"
edit-url-template = "https://github.com/jamiesun/subnetra/edit/main/docs-site/en/{path}"
site-url = "/subnetra/en/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/language-switcher.js"]
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
