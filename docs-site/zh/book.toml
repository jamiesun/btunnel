[book]
title = "Subnetra 文档"
authors = ["jettwang"]
description = "纯 Zig、零依赖的三层 UDP 隧道，产出小于 512KB 的静态单二进制文件 —— 完整文档。"
language = "zh"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/jamiesun/subnetra"
edit-url-template = "https://github.com/jamiesun/subnetra/edit/main/docs-site/zh/{path}"
site-url = "/subnetra/zh/"
additional-css = ["theme/custom.css"]
additional-js = ["theme/language-switcher.js"]
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2
