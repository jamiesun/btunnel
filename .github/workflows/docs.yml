name: Docs

# Build the bilingual (EN/ZH) mdBook documentation site under docs-site/ and
# deploy it to GitHub Pages. The two books are assembled side by side so the
# in-page language switcher can swap /en/ <-> /zh/ on the same path.

on:
  push:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs-site/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Allow the deploy job to publish to GitHub Pages via OIDC.
permissions:
  contents: read
  pages: write
  id-token: write

# One in-flight Pages deployment at a time; never cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

env:
  MDBOOK_VERSION: "0.5.3"
  MDBOOK_MERMAID_VERSION: "0.17.0"

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install mdBook ${{ env.MDBOOK_VERSION }}
        run: |
          set -euo pipefail
          url="https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" -o /tmp/mdbook.tar.gz
          sudo mkdir -p /opt/mdbook
          sudo tar -xzf /tmp/mdbook.tar.gz -C /opt/mdbook
          sudo ln -sf /opt/mdbook/mdbook /usr/local/bin/mdbook
          mdbook --version

      - name: Install mdbook-mermaid ${{ env.MDBOOK_MERMAID_VERSION }}
        run: |
          set -euo pipefail
          url="https://github.com/badboy/mdbook-mermaid/releases/download/v${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-v${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          curl -fsSL "$url" -o /tmp/mdbook-mermaid.tar.gz
          sudo mkdir -p /opt/mdbook-mermaid
          sudo tar -xzf /tmp/mdbook-mermaid.tar.gz -C /opt/mdbook-mermaid
          sudo ln -sf /opt/mdbook-mermaid/mdbook-mermaid /usr/local/bin/mdbook-mermaid
          mdbook-mermaid --version

      - name: Build EN + ZH books
        run: |
          set -euo pipefail
          mdbook build docs-site/en
          mdbook build docs-site/zh

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          rm -rf site
          mkdir -p site
          cp docs-site/index.html site/index.html
          cp -r docs-site/en/book site/en
          cp -r docs-site/zh/book site/zh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    # Only publish from the default branch; PRs build but never deploy.
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
