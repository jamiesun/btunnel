name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create the GitHub Release + upload assets
  packages: write   # push the container image to GHCR

env:
  ZIG_VERSION: "0.16.0"
  # Pinned upstream SHA256 (x86_64-linux), see https://ziglang.org/download/index.json
  ZIG_SHA256_X86_64: "70e49664a74374b48b51e6f3fdfbf437f6395d42509050588bd49abe52ba3d00"

jobs:
  guard:
    name: Verify tag matches build.zig.zon version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Assert git tag == build.zig.zon .version
        run: |
          set -euo pipefail
          zon_ver=$(sed -n 's/^[[:space:]]*\.version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' build.zig.zon | head -1)
          tag_ver="${GITHUB_REF_NAME#v}"
          echo "build.zig.zon version = ${zon_ver}"
          echo "git tag             = ${GITHUB_REF_NAME} (-> ${tag_ver})"
          if [ -z "$zon_ver" ]; then
            echo "ERROR: could not parse .version from build.zig.zon" >&2; exit 1
          fi
          if [ "$zon_ver" != "$tag_ver" ]; then
            echo "ERROR: tag ${GITHUB_REF_NAME} does not match build.zig.zon version ${zon_ver}." >&2
            echo "Bump .version in build.zig.zon to ${tag_ver} before tagging (see AGENT.md §6)." >&2
            exit 1
          fi

  release-gate:
    name: Release gate (privileged netns e2e — issue #26)
    needs: guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          set -euo pipefail
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          echo "${ZIG_SHA256_X86_64}  /tmp/zig.tar.xz" | sha256sum -c -
          sudo mkdir -p /opt/zig
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          sudo ln -s /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: Load tun module
        run: sudo modprobe tun

      # BTUNNEL_RELEASE_GATE=1 makes any SKIP a HARD FAILURE: the release is only
      # certified if the live privileged netns relay e2e actually runs and passes.
      # Evidence is appended to the job summary by the harness.
      - name: Run privileged release gate
        run: |
          sudo --preserve-env=PATH,BTUNNEL_RELEASE_GATE,GITHUB_STEP_SUMMARY \
            env "PATH=$PATH" BTUNNEL_RELEASE_GATE=1 \
            bash test/integration/run.sh

  binaries:
    name: Build static binaries (${{ matrix.arch }})
    needs: guard
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            target: x86_64-linux-musl
            cpu: ""
          - arch: arm64
            target: aarch64-linux-musl
            cpu: ""
          - arch: armv7
            target: arm-linux-musleabihf
            cpu: "generic+v7a"
          - arch: armv5
            target: arm-linux-musleabi
            cpu: "arm926ej_s"
    steps:
      - uses: actions/checkout@v5

      - name: Install Zig ${{ env.ZIG_VERSION }}
        run: |
          set -euo pipefail
          url="https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          curl -fsSL "$url" -o /tmp/zig.tar.xz
          echo "${ZIG_SHA256_X86_64}  /tmp/zig.tar.xz" | sha256sum -c -
          sudo mkdir -p /opt/zig
          sudo tar -xJf /tmp/zig.tar.xz -C /opt/zig --strip-components=1
          sudo ln -s /opt/zig/zig /usr/local/bin/zig
          zig version

      - name: Cross-build static musl binaries (ReleaseSmall)
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          size_budget=524288   # 512 KiB, iron law #6
          cpu_arg=""
          if [ -n "${{ matrix.cpu }}" ]; then cpu_arg="-Dcpu=${{ matrix.cpu }}"; fi
          zig build -Dtarget="${{ matrix.target }}" $cpu_arg -Doptimize=ReleaseSmall
          for bin in btunnel ptctl; do
            path="zig-out/bin/${bin}"
            # Iron law #6: each artifact must be static and within budget.
            if readelf -d "$path" 2>/dev/null | grep -q NEEDED; then
              echo "ERROR: ${path} (${{ matrix.target }}) is dynamically linked" >&2
              exit 1
            fi
            size=$(stat -c%s "$path")
            echo "${bin} (${{ matrix.arch }}): ${size} bytes"
            if [ "$size" -gt "$size_budget" ]; then
              echo "ERROR: ${path} ${size} bytes exceeds ${size_budget} budget" >&2
              exit 1
            fi
          done
          stage="btunnel-${version}-linux-${{ matrix.arch }}"
          mkdir -p "dist/$stage"
          cp zig-out/bin/btunnel zig-out/bin/ptctl "dist/$stage/"
          cp config.example.json README.md README.zh-CN.md LICENSE "dist/$stage/"
          tar -C dist -czf "dist/${stage}.tar.gz" "$stage"
          rm -rf "dist/$stage"
          ls -l dist

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: btunnel-${{ matrix.arch }}
          path: dist/*.tar.gz
          retention-days: 1

  release:
    name: Publish GitHub Release
    needs: [binaries, image, release-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Collect assets + combined checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -name '*.tar.gz' -exec cp {} dist/ \;
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS.txt )
          ls -l dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release create "$VERSION" \
            --repo "$REPO" \
            --title "BTunnel ${VERSION}" \
            --generate-notes \
            dist/*.tar.gz dist/SHA256SUMS.txt

  image:
    name: Build + push multi-arch image (GHCR)
    needs: [binaries, release-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Resolve lowercase image name
        id: img
        run: |
          set -euo pipefail
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${owner}/btunnel" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      # Multi-platform output needs the docker-container buildx driver. No qemu
      # is required: the Dockerfile build stage is pinned to BUILDPLATFORM and
      # Zig cross-compiles, while the final `scratch` stage only copies files.
      - name: Set up buildx (docker-container driver)
        run: |
          set -euo pipefail
          docker buildx create --name btbuilder --driver docker-container --use
          docker buildx inspect --bootstrap

      - name: Log in to GHCR
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push (amd64, arm64, arm/v7, arm/v5)
        run: |
          set -euo pipefail
          image="${{ steps.img.outputs.image }}"
          version="${{ steps.img.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v5 \
            --tag "${image}:${version}" \
            --tag "${image}:latest" \
            --label "org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}" \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            --label "org.opencontainers.image.version=${version}" \
            --push \
            .

      # Air-gapped / registry-less devices: export each arch as a standalone
      # `docker load`-able archive. Built from the same buildx cache as the push
      # above, so the contents are identical to the published per-arch image.
      - name: Export per-arch offline image tarballs
        run: |
          set -euo pipefail
          image="${{ steps.img.outputs.image }}"
          version="${{ steps.img.outputs.version }}"
          mkdir -p images
          for entry in "amd64:linux/amd64" "arm64:linux/arm64" "armv7:linux/arm/v7" "armv5:linux/arm/v5"; do
            arch="${entry%%:*}"; plat="${entry#*:}"
            docker buildx build \
              --platform "$plat" \
              --tag "${image}:${version}" \
              --output "type=docker,dest=images/btunnel-image-${version}-${arch}.tar" \
              .
            gzip -9 "images/btunnel-image-${version}-${arch}.tar"
          done
          ls -l images

      - name: Upload offline image artifacts
        uses: actions/upload-artifact@v5
        with:
          name: btunnel-images
          path: images/*.tar.gz
          retention-days: 1
